<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceControl 9.0 - Login Seguro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-color: #12141e; --card-color: #1e2230; --text-color: #e0e6ed; --text-muted: #94a3b8; --green-neon: #10b981; --red-neon: #ef4444; --blue-accent: #3b82f6; --orange-accent: #f97316; --blue-mp: #009ee3; --border-color: #2d3748; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; min-height: 100vh; }
        
        .hidden { display: none !important; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: transform 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-green { background: var(--green-neon); color: #000; }
        .btn-red { background: var(--red-neon); color: #fff; }
        .btn-ghost { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); }

        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-card { background: var(--card-color); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid var(--border-color); text-align: center; }
        .login-input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-color); border: 1px solid var(--border-color); color: white; border-radius: 8px; outline: none; font-size: 1rem; }

        .container { max-width: 1400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header-controls { display: flex; gap: 15px; align-items: center; }
        select { background: var(--card-color); color: white; border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        
        /* Grid para 4 colunas (Dinheiro Guardado incluído) */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card-color); border-radius: 16px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .kpi-title { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 5px; }
        .kpi-value { font-size: 1.8rem; font-weight: 700; }
        .text-green { color: var(--green-neon); } .text-red { color: var(--red-neon); }
        
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { position: relative; height: 250px; width: 100%; }
        
        .transactions-section { background: var(--card-color); border-radius: 16px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--text-muted); padding: 10px; border-bottom: 1px solid var(--border-color); }
        td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Cards Coloridos do Gustavo */
        .card-custom { padding: 15px; border-radius: 12px; margin-bottom: 10px; color: white; position: relative; }
        .card-itau { background: #ff8000; }
        .card-mp { background: #009ee3; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { background: var(--card-color); padding: 30px; border-radius: 16px; width: 450px; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem;}
        .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--bg-color); border: 1px solid var(--border-color); color: white; border-radius: 8px; outline: none; }
        
        #loading { display: none; position: fixed; top: 20px; right: 20px; background: var(--blue-accent); color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 2001; }
    </style>
</head>
<body>

<div id="loading">🔄 Processando...</div>

<div id="login-screen">
    <div class="login-card">
        <h1>FinanceControl</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Acesse seu painel financeiro</p>
        <input type="email" id="emailInput" class="login-input" placeholder="Seu e-mail">
        <input type="password" id="passInput" class="login-input" placeholder="Sua senha">
        <button class="btn btn-green" style="width: 100%; justify-content: center;" onclick="fazerLogin()">Entrar</button>
        <button class="btn btn-ghost" style="width: 100%; justify-content: center; margin-top: 10px;" onclick="criarConta()">Criar Conta</button>
        <p id="msgErro" style="color: var(--red-neon); margin-top: 15px; display: none;"></p>
    </div>
</div>

<div id="app" class="container hidden">
    <header>
        <div>
            <h1>Dashboard 9.0 <span style="font-size: 0.8rem; color: var(--green-neon);">● 2026</span></h1>
            <p style="color: var(--text-muted)" id="userEmailDisplay"></p>
        </div>
        <div class="header-controls">
            <select id="filtroAno"><option value="2025">2025</option><option value="2026">2026</option></select>
            <select id="filtroMes">
                <option value="todos">Todos</option>
                <option value="0">Jan</option><option value="1">Fev</option><option value="2">Mar</option>
                <option value="3">Abr</option><option value="4">Mai</option><option value="5">Jun</option>
                <option value="11">Dez</option>
            </select>
            <button class="btn btn-green" onclick="abrirModal('receita')">+ Receita</button>
            <button class="btn btn-red" onclick="abrirModal('despesa')">- Despesa</button>
            <button class="btn btn-ghost" onclick="abrirReserva()">💰 Guardar</button>
            <button class="btn btn-ghost" onclick="fazerLogout()">Sair</button>
        </div>
    </header>

    <div class="kpi-grid">
        <div class="card"><div class="kpi-title">Entradas (Mês)</div><div class="kpi-value text-green" id="totalReceitas">R$ ...</div></div>
        <div class="card"><div class="kpi-title">Saídas (Débito)</div><div class="kpi-value text-red" id="totalDespesas">R$ ...</div></div>
        <div class="card"><div class="kpi-title">Saldo Livre</div><div class="kpi-value" id="totalSaldo">R$ ...</div></div>
        <div class="card" style="border: 1px solid var(--orange-accent);"><div class="kpi-title">Reserva</div><div class="kpi-value" id="totalReserva" style="color: var(--orange-accent);">R$ 0,00</div></div>
    </div>

    <div class="charts-grid">
        <div class="card"><h3>Categorias</h3><div class="chart-container"><canvas id="graficoRosca"></canvas></div></div>
        <div class="card">
            <h3>Cartões</h3>
            <div class="card-custom card-itau">
                <div style="font-size: 0.7rem;">Itaú</div>
                <div id="txtItau" style="font-size: 1.3rem; font-weight: 700;">R$ 0,00</div>
                <div id="limItau" style="font-size: 0.6rem; opacity: 0.8; margin-top: 5px;"></div>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button class="btn-ghost" onclick="configCard('Itau')" style="padding:2px 5px; font-size:0.6rem; color:white; border-color:white;">⚙️</button>
                    <button class="btn-ghost" onclick="pagarFatura('Itau')" style="padding:2px 5px; font-size:0.6rem; color:white; border-color:white;">Pagar</button>
                </div>
            </div>
            <div class="card-custom card-mp">
                <div style="font-size: 0.7rem;">Mercado Pago</div>
                <div id="txtMP" style="font-size: 1.3rem; font-weight: 700;">R$ 0,00</div>
                <div id="limMP" style="font-size: 0.6rem; opacity: 0.8; margin-top: 5px;"></div>
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button class="btn-ghost" onclick="configCard('MP')" style="padding:2px 5px; font-size:0.6rem; color:white; border-color:white;">⚙️</button>
                    <button class="btn-ghost" onclick="pagarFatura('Mercado Pago')" style="padding:2px 5px; font-size:0.6rem; color:white; border-color:white;">Pagar</button>
                </div>
            </div>
        </div>
        <div class="card"><h3>Fluxo</h3><div class="chart-container"><canvas id="graficoBarras"></canvas></div></div>
    </div>

    <div class="transactions-section">
        <h3>Lançamentos</h3>
        <table>
            <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Método</th><th>Valor</th><th></th></tr></thead>
            <tbody id="tabelaTransacoes"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modalTransacao">
    <div class="modal">
        <h2 id="modalTitulo">Nova Transação</h2>
        <input type="hidden" id="tipoTransacao">
        <div class="form-group"><label>Descrição</label><input type="text" id="descInput"></div>
        <div class="form-group"><label>Valor (R$)</label><input type="number" id="valorInput" step="0.01"></div>
        <div class="form-group"><label>Categoria</label><select id="catSelect"></select></div>
        <div class="form-group" id="formMetodo"><label>Método</label>
        <select id="metodoInput" onchange="verificarMetodoPagamento(this.value)"><option value="debito">Débito / Pix</option><option value="credito">Cartão de Crédito</option></select></div>
        <div id="divDetalhesCredito" class="hidden">
            <div class="form-group"><label>Cartão</label><select id="cartaoSelect"><option value="Itau">Itaú</option><option value="Mercado Pago">Mercado Pago</option></select></div>
            <div class="form-group"><label>Parcelas</label><select id="parcelasSelect"><option value="1">1x</option><option value="2">2x</option><option value="3">3x</option><option value="6">6x</option></select></div>
        </div>
        <div class="form-group"><label>Data</label><input type="date" id="dataInput"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-ghost" style="flex:1" onclick="fecharModal()">Cancelar</button>
            <button class="btn btn-green" style="flex:2" onclick="salvarTransacao()">Salvar</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, writeBatch, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDLlUTDD0iQawJdSDh6sZ_VR8aHNfK7VAc", authDomain: "financecontrol-5536d.firebaseapp.com", projectId: "financecontrol-5536d" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let transacoes = [], cardConfigs = { Itau: { lim: 0, v: 23, f: 15 }, MP: { lim: 0, v: 8, f: 1 } }, chartP, chartB;

    onAuthStateChanged(auth, u => { 
        if(u) { 
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('userEmailDisplay').innerText = u.email; 
            init(); 
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }
    });

    async function init() {
        // 1. DATA ATUAL AUTOMÁTICA
        const hoje = new Date();
        document.getElementById('filtroAno').value = hoje.getFullYear().toString();
        document.getElementById('filtroMes').value = hoje.getMonth().toString();
        document.getElementById('dataInput').valueAsDate = hoje;

        const configDoc = await getDoc(doc(db, "config", "cartoes"));
        if(configDoc.exists()) cardConfigs = configDoc.data();

        onSnapshot(collection(db, "lancamentos"), snap => {
            transacoes = [];
            snap.forEach(d => transacoes.push({id: d.id, ...d.data()}));
            atualizarTela();
        });
    }

    function atualizarTela() {
        const ano = filtroAno.value, mes = filtroMes.value;
        const filtradas = transacoes.filter(t => {
            const dt = new Date(t.data + 'T12:00:00');
            return mes === 'todos' ? dt.getFullYear() == ano : dt.getFullYear() == ano && dt.getMonth() == mes;
        });

        // 3. SALDO ACUMULADO (PASSANDO DO MÊS PASSADO)
        let saldoAcumulado = 0;
        if(mes !== 'todos') {
            const dataLimite = new Date(ano, mes, 1);
            saldoAcumulado = transacoes.filter(t => {
                const d = new Date(t.data + 'T12:00:00');
                return d < dataLimite && t.categoria !== 'Reserva';
            }).reduce((a,b) => b.tipo === 'receita' ? a + b.valor : a - (b.metodo === 'debito' ? b.valor : 0), 0);
        }

        const ent = filtradas.filter(t => t.tipo === 'receita').reduce((a,b)=>a+b.valor,0);
        const saiDeb = filtradas.filter(t => t.tipo === 'despesa' && t.metodo === 'debito').reduce((a,b)=>a+b.valor,0);
        const res = transacoes.filter(t => t.categoria === 'Reserva').reduce((a,b)=>a+b.valor,0);
        
        totalReceitas.innerText = fmt(ent);
        totalDespesas.innerText = fmt(saiDeb);
        totalSaldo.innerText = fmt(saldoAcumulado + ent - saiDeb);
        totalReserva.innerText = fmt(res);

        const itauVal = filtradas.filter(t => t.cartao === 'Itau').reduce((a,b)=>a+b.valor,0);
        const mpVal = filtradas.filter(t => t.cartao === 'Mercado Pago').reduce((a,b)=>a+b.valor,0);
        txtItau.innerText = fmt(itauVal); txtMP.innerText = fmt(mpVal);
        limItau.innerText = `Livre: ${fmt(cardConfigs.Itau.lim - itauVal)} | Vence: ${cardConfigs.Itau.v}`;
        limMP.innerText = `Livre: ${fmt(cardConfigs.MP.lim - mpVal)} | Vence: ${cardConfigs.MP.v}`;

        renderTab(filtradas);
        renderCharts(filtradas, ent, saiDeb);
    }

    // 2. DINHEIRO GUARDADO (RETIRANDO DAS ENTRADAS)
    window.abrirReserva = async () => {
        const v = prompt("Quanto deseja guardar?");
        if(v) await addDoc(collection(db, "lancamentos"), { 
            descricao: "Reserva", valor: parseFloat(v), categoria: "Reserva", 
            tipo: "despesa", metodo: "debito", data: new Date().toISOString().split('T')[0] 
        });
    };

    // 4. CONFIGURAÇÃO MANUAL DE CARTÕES
    window.configCard = async (card) => {
        const l = prompt("Limite total:", cardConfigs[card].lim);
        const v = prompt("Dia vencimento:", cardConfigs[card].v);
        const f = prompt("Dia fechamento:", cardConfigs[card].f);
        if(l && v && f) {
            cardConfigs[card] = { lim: parseFloat(l), v: parseInt(v), f: parseInt(f) };
            await setDoc(doc(db, "config", "cartoes"), cardConfigs);
            atualizarTela();
        }
    };

    // 5. BOTÃO PAGAR FATURA
    window.pagarFatura = async (card) => {
        const val = card === 'Itau' ? 
            parseFloat(txtItau.innerText.replace(/[^\d,-]/g,'').replace(',','.')) :
            parseFloat(txtMP.innerText.replace(/[^\d,-]/g,'').replace(',','.'));
        if(val <= 0) return alert("Sem valor pendente.");
        if(confirm(`Pagar fatura de ${fmt(val)}? Isso sairá do saldo livre.`)) {
            await addDoc(collection(db, "lancamentos"), {
                descricao: `Pagamento Fatura ${card}`, valor: val, categoria: "Cartão",
                data: new Date().toISOString().split('T')[0], tipo: "despesa", metodo: "debito", userId: auth.currentUser.uid
            });
        }
    }

    window.salvarTransacao = async () => {
        const v = parseFloat(valorInput.value);
        if(!v || !descInput.value) return;
        if(metodoInput.value === 'credito') {
            const batch = writeBatch(db);
            const p = parseInt(parcelasSelect.value);
            for(let i=0; i<p; i++) {
                let d = new Date(dataInput.value + 'T12:00:00'); d.setMonth(d.getMonth() + i);
                batch.set(doc(collection(db, "lancamentos")), { 
                    descricao: `${descInput.value} (${i+1}/${p})`, valor: v/p, data: d.toISOString().split('T')[0],
                    tipo: 'despesa', metodo: 'credito', cartao: cartaoSelect.value, categoria: catSelect.value
                });
            }
            await batch.commit();
        } else {
            await addDoc(collection(db, "lancamentos"), { 
                descricao: descInput.value, valor: v, data: dataInput.value, 
                tipo: tipoTransacao.value, metodo: 'debito', categoria: catSelect.value 
            });
        }
        fecharModal();
    };

    window.fazerLogin = async () => {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } 
        catch (e) { alert("Erro de login"); }
    };

    window.criarConta = async () => {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        try { await createUserWithEmailAndPassword(auth, email, pass); alert("Conta criada!"); } 
        catch (e) { alert("Erro ao criar conta"); }
    };

    window.abrirModal = t => { 
        modalTransacao.style.display='flex'; tipoTransacao.value=t; 
        modalTitulo.innerText = t === 'receita' ? 'Nova Receita' : 'Nova Despesa';
        formMetodo.classList.toggle('hidden', t === 'receita');
        catSelect.innerHTML = (t==='receita'?['Salário','Freelance','Outros']:['Alimentação','Moradia','Lazer','Outros']).map(c=>`<option value="${c}">${c}</option>`).join('');
    };
    window.fecharModal = () => modalTransacao.style.display='none';
    window.verificarMetodoPagamento = v => divDetalhesCredito.classList.toggle('hidden', v !== 'credito');
    window.fazerLogout = () => signOut(auth);
    const fmt = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    function renderTab(l) {
        tabelaTransacoes.innerHTML = l.sort((a,b)=>new Date(b.data)-new Date(a.data)).map(t => `<tr><td>${t.data.split('-').reverse().join('/')}</td><td>${t.descricao}</td><td>${t.categoria}</td><td>${t.metodo==='credito'?'💳 '+t.cartao:'💰 Pix'}</td><td style="color:${t.tipo==='receita'?'#10b981':'#ef4444'}">${fmt(t.valor)}</td><td><button onclick="del('${t.id}')" style="background:none; border:none; color:gray; cursor:pointer">✕</button></td></tr>`).join('');
    }
    window.del = id => confirm("Apagar?") && deleteDoc(doc(db, "lancamentos", id));
    function renderCharts(l, e, s) {
        if(chartP) chartP.destroy(); if(chartB) chartB.destroy();
        const d = l.filter(t => t.tipo === 'despesa');
        const c = {}; d.forEach(t => c[t.categoria] = (c[t.categoria] || 0) + t.valor);
        chartP = new Chart(graficoRosca, { type: 'doughnut', data: { labels: Object.keys(c), datasets: [{ data: Object.values(c), backgroundColor: ['#ef4444', '#3b82f6', '#10b981', '#f59e0b'], borderWidth: 0 }] }, options: { maintainAspectRatio: false } });
        chartB = new Chart(graficoBarras, { type: 'bar', data: { labels: ['Entradas', 'Saídas'], datasets: [{ data: [e, s], backgroundColor: ['#10b981', '#ef4444'] }] }, options: { maintainAspectRatio: false } });
    }
    filtroAno.onchange = atualizarTela; filtroMes.onchange = atualizarTela;
</script>
</body>
</html>
