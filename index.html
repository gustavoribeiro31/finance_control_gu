<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceControl 11.0 - Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-color: #12141e; --card-color: #1e2230; --text-color: #e0e6ed; --text-muted: #94a3b8; --green-neon: #10b981; --red-neon: #ef4444; --blue-accent: #3b82f6; --orange-accent: #f97316; --blue-mp: #009ee3; --border-color: #2d3748; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; min-height: 100vh; }
        
        .hidden { display: none !important; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: transform 0.2; display: flex; align-items: center; gap: 5px; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-green { background: var(--green-neon); color: #000; }
        .btn-red { background: var(--red-neon); color: #fff; }
        .btn-ghost { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); }

        /* KPI Grid - 4 Colunas */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card-kpi { background: var(--card-color); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .kpi-title { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; }
        .kpi-value { font-size: 1.5rem; font-weight: 700; }

        /* Estilo dos Cartões Coloridos (Baseado na imagem 1) */
        .cards-container { display: flex; flex-direction: column; gap: 10px; }
        .mini-card { padding: 15px; border-radius: 12px; position: relative; color: white; min-height: 100px; transition: 0.3s; }
        .mini-card.itau { background: linear-gradient(135deg, #ff8000, #f97316); }
        .mini-card.mp { background: linear-gradient(135deg, #009ee3, #1e2230); border: 1px solid var(--blue-mp); }
        .card-brand { position: absolute; top: 15px; right: 15px; font-size: 0.8rem; font-weight: bold; opacity: 0.8; }
        .card-number { font-family: monospace; font-size: 0.7rem; margin-top: 10px; opacity: 0.7; }
        .btn-pagar { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; margin-top: 5px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-box { background: var(--card-color); border-radius: 16px; padding: 20px; height: 320px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--text-muted); padding: 10px; border-bottom: 1px solid var(--border-color); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #modalTransacao { z-index: 3000; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; }
        .modal { background: var(--card-color); padding: 25px; border-radius: 20px; width: 400px; }
    </style>
</head>
<body>

<div id="login-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-color); z-index:5000; display:flex; justify-content:center; align-items:center;">
    <div style="background:var(--card-color); padding:40px; border-radius:20px; text-align:center; width:350px;">
        <h2>FinanceControl</h2>
        <input type="email" id="emailInput" placeholder="E-mail" style="width:100%; margin:20px 0 10px; padding:12px; background:var(--bg-color); color:white; border:1px solid var(--border-color); border-radius:8px;">
        <input type="password" id="passInput" placeholder="Senha" style="width:100%; margin-bottom:20px; padding:12px; background:var(--bg-color); color:white; border:1px solid var(--border-color); border-radius:8px;">
        <button class="btn btn-green" style="width:100%; justify-content:center;" onclick="fazerLogin()">Entrar</button>
    </div>
</div>

<div id="app" class="hidden">
    <header>
        <div>
            <h1 style="font-size: 1.5rem;">Dashboard <span style="color: var(--green-neon); font-size: 0.8rem;">● 2026</span></h1>
            <p id="userDisplay" style="color: var(--text-muted); font-size: 0.8rem;"></p>
        </div>
        <div style="display:flex; gap:10px;">
            <select id="filtroAno"><option value="2025">2025</option><option value="2026">2026</option></select>
            <select id="filtroMes">
                <option value="0">Jan</option><option value="1">Fev</option><option value="2">Mar</option>
                <option value="3">Abr</option><option value="4">Mai</option><option value="5">Jun</option>
                <option value="11">Dez</option>
            </select>
            <button class="btn btn-green" onclick="abrirModal('receita')">+ Receita</button>
            <button class="btn btn-red" onclick="abrirModal('despesa')">- Despesa</button>
            <button class="btn btn-ghost" onclick="abrirModalReserva()">💰 Guardar</button>
        </div>
    </header>

    <div class="kpi-grid">
        <div class="card-kpi"><div class="kpi-title">Entradas</div><div class="kpi-value" id="valEntradas" style="color:var(--green-neon)">R$ 0,00</div></div>
        <div class="card-kpi"><div class="kpi-title">Saídas (Débito)</div><div class="kpi-value" id="valSaidas" style="color:var(--red-neon)">R$ 0,00</div></div>
        <div class="card-kpi"><div class="kpi-title">Saldo Livre</div><div class="kpi-value" id="valSaldo">R$ 0,00</div></div>
        <div class="card-kpi" style="border:1px solid var(--orange-accent)"><div class="kpi-title">Dinheiro Guardado</div><div class="kpi-value" id="valReserva" style="color:var(--orange-accent)">R$ 0,00</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-box"><h3>Categorias</h3><canvas id="chartPie"></canvas></div>
        <div class="chart-box">
            <h3>Cartões</h3>
            <div class="cards-container">
                <div class="mini-card itau">
                    <div class="card-brand">Mastercard</div>
                    <div style="font-size:0.7rem;">Itaú</div>
                    <div style="font-size:1.2rem; font-weight:700; margin-top:5px;" id="txtItau">R$ 0,00</div>
                    <div class="card-number">**** 0096</div>
                    <button class="btn-pagar" onclick="pagarFatura('Itau')">Pagar Fatura</button>
                </div>
                <div class="mini-card mp">
                    <div class="card-brand">VISA</div>
                    <div style="font-size:0.7rem;">Mercado Pago</div>
                    <div style="font-size:1.2rem; font-weight:700; margin-top:5px;" id="txtMP">R$ 0,00</div>
                    <div class="card-number">**** 2855</div>
                    <button class="btn-pagar" onclick="pagarFatura('Mercado Pago')">Pagar Fatura</button>
                </div>
            </div>
        </div>
        <div class="chart-box"><h3>Balanço</h3><canvas id="chartBar"></canvas></div>
    </div>

    <div style="background:var(--card-color); border-radius:16px; padding:20px;">
        <h3>Extrato</h3>
        <table id="tabLancamentos">
            <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Pagamento</th><th>Valor</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modalTransacao">
    <div class="modal">
        <h3 id="modalTit">Novo Lançamento</h3>
        <input type="hidden" id="tipoTrans">
        <div style="margin-top:15px;">
            <label>Descrição</label><input type="text" id="inDesc" style="width:100%; padding:10px; margin-bottom:10px;">
            <label>Valor</label><input type="number" id="inValor" style="width:100%; padding:10px; margin-bottom:10px;">
            <label>Método</label>
            <select id="inMetodo" style="width:100%; padding:10px; margin-bottom:10px;" onchange="toggleCredito(this.value)">
                <option value="debito">Débito / Pix</option>
                <option value="credito">Cartão de Crédito</option>
            </select>
            <div id="areaCredito" class="hidden">
                <select id="inCartao" style="width:100%; padding:10px; margin-bottom:10px;"><option value="Itau">Itaú</option><option value="Mercado Pago">Mercado Pago</option></select>
            </div>
            <label>Data</label><input type="date" id="inData" style="width:100%; padding:10px; margin-bottom:15px;">
            <button class="btn btn-green" style="width:100%; justify-content:center;" onclick="salvar()">Confirmar</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDLlUTDD0iQawJdSDh6sZ_VR8aHNfK7VAc", authDomain: "financecontrol-5536d.firebaseapp.com", projectId: "financecontrol-5536d" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let dados = [];
    let chartP, chartB;

    onAuthStateChanged(auth, u => {
        if(u) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = u.email;
            init();
        }
    });

    function init() {
        const hoje = new Date();
        document.getElementById('filtroAno').value = "2026";
        document.getElementById('filtroMes').value = hoje.getMonth().toString();
        document.getElementById('inData').valueAsDate = hoje;

        onSnapshot(collection(db, "lancamentos"), snap => {
            dados = [];
            snap.forEach(d => dados.push({id: d.id, ...d.data()}));
            refresh();
        });
    }

    window.fazerLogin = () => signInWithEmailAndPassword(auth, emailInput.value, passInput.value);
    
    window.refresh = () => {
        const ano = filtroAno.value;
        const mes = filtroMes.value;
        const f = dados.filter(d => {
            const dt = new Date(d.data + 'T12:00:00');
            return dt.getFullYear() == ano && dt.getMonth() == mes;
        });

        const ent = f.filter(d => d.tipo === 'receita').reduce((a,b) => a + b.valor, 0);
        const sai = f.filter(d => d.tipo === 'despesa' && d.metodo === 'debito').reduce((a,b) => a + b.valor, 0);
        const res = dados.filter(d => d.categoria === 'Reserva').reduce((a,b) => a + b.valor, 0);
        const itau = f.filter(d => d.cartao === 'Itau').reduce((a,b) => a + b.valor, 0);
        const mp = f.filter(d => d.cartao === 'Mercado Pago').reduce((a,b) => a + b.valor, 0);

        valEntradas.innerText = fmt(ent);
        valSaidas.innerText = fmt(sai);
        valSaldo.innerText = fmt(ent - sai);
        valReserva.innerText = fmt(res);
        txtItau.innerText = fmt(itau);
        txtMP.innerText = fmt(mp);

        renderTab(f);
        renderCharts(ent, sai, f);
    }

    window.pagarFatura = async (card) => {
        const valor = card === 'Itau' ? 
            parseFloat(txtItau.innerText.replace(/[^\d,-]/g,'').replace(',','.')) : 
            parseFloat(txtMP.innerText.replace(/[^\d,-]/g,'').replace(',','.'));
        
        if(confirm(`Pagar fatura de ${card} no valor de ${fmt(valor)}?`)) {
            await addDoc(collection(db, "lancamentos"), {
                descricao: `Paguei Fatura ${card}`, valor: Math.abs(valor), tipo: 'despesa', metodo: 'debito', 
                categoria: 'Cartão', data: new Date().toISOString().split('T')[0]
            });
        }
    }

    window.abrirModalReserva = () => {
        const v = prompt("Quanto deseja guardar na reserva?");
        if(v) {
            addDoc(collection(db, "lancamentos"), {
                descricao: "Aporte Reserva", valor: parseFloat(v), tipo: 'despesa', 
                metodo: 'debito', categoria: 'Reserva', data: new Date().toISOString().split('T')[0]
            });
        }
    }

    function renderTab(lista) {
        const b = document.querySelector('#tabLancamentos tbody');
        b.innerHTML = '';
        lista.sort((x,y) => new Date(y.data) - new Date(x.data)).forEach(d => {
            const r = b.insertRow();
            r.innerHTML = `<td>${d.data.split('-').reverse().join('/')}</td><td>${d.descricao}</td><td>${d.categoria || 'Geral'}</td>
            <td>${d.metodo === 'credito' ? '💳 '+d.cartao : '💰 Débito'}</td>
            <td style="color:${d.tipo==='receita'?'#10b981':'#ef4444'}">${fmt(d.valor)}</td>
            <td><button onclick="del('${d.id}')" style="background:none; border:none; color:gray; cursor:pointer">✕</button></td>`;
        });
    }

    window.del = id => confirm("Excluir?") && deleteDoc(doc(db, "lancamentos", id));

    function renderCharts(e, s, f) {
        if(chartP) chartP.destroy();
        if(chartB) chartB.destroy();
        const ctxP = document.getElementById('chartPie').getContext('2d');
        const ctxB = document.getElementById('chartBar').getContext('2d');
        
        chartP = new Chart(ctxP, { type: 'doughnut', data: { labels: ['Saídas'], datasets: [{ data: [s], backgroundColor: ['#ef4444'] }] }, options: { maintainAspectRatio: false } });
        chartB = new Chart(ctxB, { type: 'bar', data: { labels: ['Entradas', 'Saídas'], datasets: [{ data: [e, s], backgroundColor: ['#10b981', '#ef4444'] }] }, options: { maintainAspectRatio: false } });
    }

    window.abrirModal = t => { modalTransacao.style.display='flex'; tipoTrans.value=t; areaCredito.classList.add('hidden'); }
    window.fecharModal = () => modalTransacao.style.display='none';
    window.toggleCredito = v => areaCredito.classList.toggle('hidden', v !== 'credito');
    window.salvar = async () => {
        await addDoc(collection(db, "lancamentos"), {
            descricao: inDesc.value, valor: parseFloat(inValor.value), tipo: tipoTrans.value,
            metodo: inMetodo.value, cartao: inMetodo.value === 'credito' ? inCartao.value : null,
            data: inData.value, createdAt: new Date()
        });
        fecharModal();
    }
    const fmt = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    
    filtroAno.onchange = refresh;
    filtroMes.onchange = refresh;
</script>
</body>
</html>
